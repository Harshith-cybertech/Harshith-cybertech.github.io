<!DOCTYPE html>
<html>
<head>
<title>Legendary Hero Janardhan 👑🔥</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Georgia,serif;
background:black;
color:white;
overflow:hidden;
animation:zoomEffect 40s linear infinite alternate;
}

@keyframes zoomEffect{
from{transform:scale(1);}
to{transform:scale(1.03);}
}

/* ===== PAGE TRANSITION ===== */
.page{
position:fixed;
width:100%;
height:100vh;
top:0;
left:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:20;
opacity:0;
transform:scale(1.2);
transition:all 1s ease;
pointer-events:none;
}

.page.active{
opacity:1;
transform:scale(1);
pointer-events:auto;
}

/* Floating Golden Background */
.introBg{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
overflow:hidden;
}

.introCircle{
position:absolute;
width:10px;
height:10px;
background:gold;
border-radius:50%;
opacity:0.6;
animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* Heart */
#heart{
font-size:140px;
color:red;
cursor:pointer;
animation:beat 1.2s infinite;
text-shadow:0 0 50px red,0 0 100px darkred;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

.page h1{
font-size:50px;
letter-spacing:4px;
animation:fadeText 2s ease;
}

@keyframes fadeText{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

/* STAR BACKGROUND */
.stars{
position:fixed;
width:100%;
height:100%;
z-index:-2;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:moveStar 10s linear infinite;
}

@keyframes moveStar{
from{transform:translateY(0);}
to{transform:translateY(100vh);}
}

/* MAIN */
#mainContent{
display:none;
padding:60px 20px;
min-height:100vh;
background:radial-gradient(circle,#400000,#000000);
position:relative;
overflow:hidden;
}

/* HERO TITLE */
#cinemaTitle{
text-align:center;
font-size:65px;
letter-spacing:8px;
color:#ff1a1a;
opacity:0;
transform:scale(0.5);
animation:heroEntry 2s forwards;
animation-delay:1s;
text-shadow:0 0 30px red,0 0 70px darkred;
}

@keyframes heroEntry{
to{opacity:1;transform:scale(1);}
}

/* FIREWORKS */
.firework{
position:absolute;
width:6px;
height:6px;
background:gold;
border-radius:50%;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}

/* PHOTO */
#photo{
position:absolute;
left:40px;
top:220px;
width:250px;
border-radius:20px;
box-shadow:0 0 50px red;
animation:photoGlow 2s infinite alternate;
z-index:2;
}

@keyframes photoGlow{
from{box-shadow:0 0 30px red;}
to{box-shadow:0 0 80px red;}
}

#textArea{
margin-left:350px;
margin-right:20px;
font-size:22px;
line-height:1.9;
position:relative;
z-index:2;
}

#wish{color:gold;font-size:30px;}
#thoughts{color:#ff99cc;}
#days{color:#66ffff;font-size:26px;}

/* ===== BALLOON BACKGROUND ===== */
.mainBalloons{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
overflow:hidden;
}

.balloon{
position:absolute;
bottom:-120px;
width:40px;
height:55px;
border-radius:50%;
animation:balloonFloat linear infinite;
opacity:0.8;
}

.balloon::after{
content:"";
position:absolute;
bottom:-15px;
left:50%;
width:2px;
height:20px;
background:white;
transform:translateX(-50%);
}

@keyframes balloonFloat{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

@media(max-width:768px){
#photo{position:relative;left:0;top:0;margin:auto;display:block;margin-bottom:20px;}
#textArea{margin:0;text-align:center;}
#cinemaTitle{font-size:40px;}
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<!-- PAGES (UNCHANGED) -->
<div class="page active" id="page1">
<div class="introBg" id="bg1"></div>
<div id="heart" onclick="startFlow()">❤️</div>
<p>Click the Heart</p>
</div>

<div class="page" id="page2">
<div class="introBg" id="bg2"></div>
<h1>Welcome 👑</h1>
</div>

<div class="page" id="page3">
<div class="introBg" id="bg3"></div>
<h1>This is Your Special Day 🎉</h1>
</div>

<div class="page" id="page4">
<div class="introBg" id="bg4"></div>
<h1>Let’s Get Started 🔥</h1>
</div>

<div class="stars" id="stars"></div>

<div id="mainContent">
<h1 id="cinemaTitle">JANARDHAN 👑</h1>
<img src="janardhan.jpg" id="photo">
<div id="textArea">
<h2 id="wish"></h2>
<p id="thoughts"></p>
<p id="days"></p>
</div>
</div>

<script>

/* Intro Background */
function createBg(id){
let bg=document.getElementById(id);
for(let i=0;i<30;i++){
let c=document.createElement("div");
c.className="introCircle";
c.style.left=Math.random()*100+"%";
c.style.animationDuration=(3+Math.random()*4)+"s";
bg.appendChild(c);
}
}
createBg("bg1");createBg("bg2");createBg("bg3");createBg("bg4");

let music=document.getElementById("music");

/* Stars */
let starsContainer=document.getElementById("stars");
for(let i=0;i<100;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";
star.style.animationDuration=(5+Math.random()*5)+"s";
starsContainer.appendChild(star);
}

function showPage(current,next){
document.getElementById(current).classList.remove("active");
setTimeout(()=>{document.getElementById(next).classList.add("active");},500);
}

function startFlow(){
music.play();
showPage("page1","page2");
setTimeout(()=>showPage("page2","page3"),2500);
setTimeout(()=>showPage("page3","page4"),5000);

setTimeout(()=>{
document.getElementById("page4").classList.remove("active");
document.getElementById("mainContent").style.display="block";
launchFireworks();
startTyping();
createMainBalloons();
},7500);
}

/* Fireworks */
function launchFireworks(){
for(let i=0;i<40;i++){
let fire=document.createElement("div");
fire.className="firework";
fire.style.left="50%";
fire.style.top="20%";
fire.style.setProperty('--x',(Math.random()*400-200)+"px");
fire.style.setProperty('--y',(Math.random()*400-200)+"px");
document.body.appendChild(fire);
}
}

/* Typing */
function typeEffect(element,text,speed,delay){
setTimeout(()=>{
let i=0;
let interval=setInterval(()=>{
element.innerHTML+=text.charAt(i);
i++;
if(i>=text.length) clearInterval(interval);
},speed);
},delay);
}

function startTyping(){
typeEffect(document.getElementById("wish"),
"Happiest Birthday Janardhan 🎉",80,2500);

typeEffect(document.getElementById("thoughts"),
"On this beautiful day, I just want you to know how truly special you are. Your smile spreads happiness, your strength inspires everyone around you, and your presence makes every moment brighter. May this new year bring success, peace, love and unforgettable memories. May your day be filled with happiness, laughter, and all the success you deserve.",90,7000);

let birth=new Date("2003-02-28");
let today=new Date();
let diff=today-birth;
let days=Math.floor(diff/(1000*60*60*24));

typeEffect(document.getElementById("days"),
"You have beautifully completed "+days+" days on Earth ❤️",80,36000);
}

/* Balloons */
function createMainBalloons(){
let container=document.createElement("div");
container.className="mainBalloons";
document.getElementById("mainContent").appendChild(container);

for(let i=0;i<18;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"%";
b.style.background="hsl("+Math.random()*360+",70%,60%)";
b.style.animationDuration=(6+Math.random()*6)+"s";
b.style.animationDelay=Math.random()*5+"s";
container.appendChild(b);
}
}

</script>

</body>
</html>
